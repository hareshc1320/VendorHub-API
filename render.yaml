services:
  - type: web
    name: vendorhub-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && node src/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
